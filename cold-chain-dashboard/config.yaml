export:
  default_encoding: utf-8-sig
thresholds:
  breakpoint_interval_minutes: 10
  continuous_over_temp_minutes: 5
  merge_window_minutes: 30
  temperature_upper_limit: -15.0
carrier_alert:
  pre_window_minutes: 30
  post_window_minutes: 30
validation:
  allow_missing_box_id: true
  reject_duplicate_batch: true
  skip_invalid_timestamp_rows: true
assignment:
  default_priority: 中
  default_assignees:
    - 早班A
    - 早班B
    - 中班A
    - 中班B
    - 晚班A
    - 晚班B
qc_inspection:
  required_columns:
    - 箱号
    - 抽检时间
    - 外观结果
    - 温度计读数
    - 处置建议
  time_column: 抽检时间
  time_format: "%Y-%m-%d %H:%M:%S"
  match_window_minutes: 60
handover_check:
  required_columns:
    - 箱号
    - 交接时间
    - 交接点
    - 交接温度
    - 交接人
    - 备注
  time_column: 交接时间
  time_format: "%Y-%m-%d %H:%M:%S"
  temperature_lower_limit: -40.0
  temperature_upper_limit: 10.0
  match_window_minutes: 120
damage_claim:
  required_columns:
    - 箱号
    - 登记时间
    - 破损类型
    - 破损等级
    - 照片编号
    - 登记人
    - 备注
  time_column: 登记时间
  time_format: "%Y-%m-%d %H:%M:%S"
  damage_levels:
    - 轻微
    - 中度
    - 严重
    - 拒收
  acceptable_damage_types:
    - 外包装破损
    - 内包装破损
    - 封条破损
    - 箱体变形
    - 标签缺失
    - 渗漏
    - 虫害
    - 其他
  match_window_minutes: 180
